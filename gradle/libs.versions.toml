metadata.format.version = "1.1"

[versions]
kotlin = "2.3.0"
minestom = "2026.06.05-26.1.2"
jukebox = "2026-06-13-3d8993c"
configurate = "4.2.0"
minimessage = "4.19.0"
kmongo = "5.2.1"
caffeine = "3.2.0"
okhttp = "4.12.0"
serialization = "1.8.0"
tinylog = "2.7.0"
atlas-projectiles = "2.1.5"
fastutil = "8.5.18"
polar = "1.15.1"
slf4j = "2.0.18"
# Auto-generated GRPC/Protobuf messaging code
rpc = "2026-06-13-f05505c"
# Messaging dependencies
grpc = "1.71.0"
grpc-kotlin-stub = "1.4.1"
protobuf-kotlin = "4.30.1"
# Testing dependencies
mockk = "1.14.9"
junit = "5.9.0"

[libraries]
kotlin-jvm = { group = "org.jetbrains.kotlin", name = "kotlin-gradle-plugin", version.ref = "kotlin" }
minestom = { group = "net.minestom", name = "minestom", version.ref = "minestom" }
jukebox = { group = "com.bluedragonmc", name = "jukebox", version.ref = "jukebox" }
#jukebox = { group = "com.bluedragonmc", name = "jukebox", version = "dev" }
configurate-yaml = { group = "org.spongepowered", name = "configurate-yaml", version.ref = "configurate" }
configurate-gson = { group = "org.spongepowered", name = "configurate-gson", version.ref = "configurate" }
configurate-extra-kotlin = { group = "org.spongepowered", name = "configurate-extra-kotlin", version.ref = "configurate" }
minimessage = { group = "net.kyori", name = "adventure-text-minimessage", version.ref = "minimessage" }
atlas-projectiles = { group = "ca.atlasengine", name = "atlas-projectiles", version.ref = "atlas-projectiles" }
fastutil = { group = "it.unimi.dsi", name = "fastutil", version.ref = "fastutil" }
kmongo = { group = "org.litote.kmongo", name = "kmongo-coroutine-serialization", version.ref = "kmongo" }
serialization-json = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "serialization" }
caffeine = { group = "com.github.ben-manes.caffeine", name = "caffeine", version.ref = "caffeine" }
okhttp = { group = "com.squareup.okhttp3", name = "okhttp", version.ref = "okhttp" }
rpc = { group = "com.bluedragonmc", name = "rpc", version.ref = "rpc" }
#rpc = { group = "com.bluedragonmc", name = "rpc", version = "dev" }
grpc-protobuf = { group = "io.grpc", name = "grpc-protobuf", version.ref = "grpc" }
grpc-netty = { group = "io.grpc", name = "grpc-netty", version.ref = "grpc" }
grpc-kotlin-stub = { group = "io.grpc", name = "grpc-kotlin-stub", version.ref = "grpc-kotlin-stub" }
#grpc-services = { group = "io.grpc", name = "grpc-services", version.ref = "grpc" }
protobuf-kotlin = { group = "com.google.protobuf", name = "protobuf-kotlin", version.ref = "protobuf-kotlin" }
mockk = { group = "io.mockk", name = "mockk", version.ref = "mockk" }
junit-api = { group = "org.junit.jupiter", name = "junit-jupiter-api", version.ref = "junit" }
junit-engine = { group = "org.junit.jupiter", name = "junit-jupiter-engine", version.ref = "junit" }
tinylog-api = { group = "org.tinylog", name = "tinylog-api", version.ref = "tinylog"}
tinylog-impl = { group = "org.tinylog", name = "tinylog-impl", version.ref = "tinylog"}
tinylog-slf4j = { group = "org.tinylog", name = "slf4j-tinylog", version.ref = "tinylog"}
polar = { group = "dev.hollowcube", name = "polar", version.ref = "polar"}
slf4j = { group = "org.slf4j", name = "slf4j-api", version.ref = "slf4j" }

[bundles]
configurate = ["configurate-yaml", "configurate-gson", "configurate-extra-kotlin"]
messaging = ["rpc", "grpc-protobuf", "grpc-netty", "grpc-kotlin-stub", "protobuf-kotlin"]
tinylog = ["tinylog-api", "tinylog-impl", "tinylog-slf4j"]
